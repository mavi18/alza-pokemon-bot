name: Run Alza Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-alza:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb python3-tk python3-dev

      - name: Install dependencies
        run: |
          pip install seleniumbase requests python-dotenv pyautogui

      - name: Run bot
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ALZA_URL: ${{ secrets.ALZA_URL }}
        run: python main.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: error.png
          if-no-files-found: ignore

      - name: Commit and push if seen_products.json changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_products.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen products [skip ci]" && git push)
