name: Run Alza Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  workflow_dispatch:      # Allows manual trigger

jobs:
  check-alza:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to commit seen_products.json back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run bot
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ALZA_URL: ${{ secrets.ALZA_URL }}
        run: python main.py

      - name: Commit and push if seen_products.json changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_products.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen products [skip ci]" && git push)
